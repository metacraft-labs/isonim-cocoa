name: IsoNimCocoa
options:
  bundleIdPrefix: com.metacraft.isonim
  deploymentTarget:
    iOS: "17.0"
    macOS: "14.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true

settings:
  base:
    DEVELOPMENT_TEAM: GK3D7BH967
    CODE_SIGN_STYLE: Automatic
    COMPILER_INDEX_STORE_ENABLE: NO

targets:
  IsoNim-Branded:
    type: application
    platform: iOS
    sources:
      - path: ios-app/Sources
    settings:
      base:
        INFOPLIST_FILE: ios-app/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.metacraft.isonim.cocoa.branded
        SWIFT_ACTIVE_COMPILATION_CONDITIONS: THEME_BRANDED
        PRODUCT_NAME: "IsoNim Branded"
        PRODUCT_MODULE_NAME: IsoNimCocoa_iOS
        OTHER_LDFLAGS: ["-lisonim_app", "-lobjc", "-lc++"]
        LIBRARY_SEARCH_PATHS: ["$(PROJECT_DIR)/build"]
    dependencies: []

  IsoNim-NimNative:
    type: application
    platform: iOS
    sources:
      - path: ios-app/Sources
    settings:
      base:
        INFOPLIST_FILE: ios-app/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.metacraft.isonim.cocoa.nimnative
        SWIFT_ACTIVE_COMPILATION_CONDITIONS: THEME_NIM_NATIVE
        PRODUCT_NAME: "IsoNim NimNative"
        PRODUCT_MODULE_NAME: IsoNimCocoa_iOS
        OTHER_LDFLAGS: ["-lisonim_native", "-lobjc", "-lc++"]
        LIBRARY_SEARCH_PATHS: ["$(PROJECT_DIR)/build"]
    dependencies: []

  IsoNim-Baseline:
    type: application
    platform: iOS
    sources:
      - path: ios-app/Sources
    settings:
      base:
        INFOPLIST_FILE: ios-app/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.metacraft.isonim.cocoa
        SWIFT_ACTIVE_COMPILATION_CONDITIONS: THEME_BASELINE
        PRODUCT_NAME: "IsoNim Baseline"
        PRODUCT_MODULE_NAME: IsoNimCocoa_iOS
    dependencies: []

  IsoNim-Native:
    type: application
    platform: iOS
    sources:
      - path: ios-app/Sources
    settings:
      base:
        INFOPLIST_FILE: ios-app/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.metacraft.isonim.cocoa.native
        SWIFT_ACTIVE_COMPILATION_CONDITIONS: THEME_NATIVE
        PRODUCT_NAME: "IsoNim Native"
        PRODUCT_MODULE_NAME: IsoNimCocoa_iOS
    dependencies: []

  # Stream variant: Nim demo UI + TCP F-packet listener on port 8200
  # for the editor's pbIos launcher to dial into. Sibling of Branded —
  # links against the legacy `libisonim_app.a` (Branded scene fallback)
  # PLUS the M-EVP-14 demo libraries `libtask_app_ios.a` and
  # `libsettings_app_ios.a`. The Swift VC dispatches by the
  # `ISONIM_DEMO` env var to whichever entry point the host injected
  # (default `task`); a single bundle id keeps us under the 3-app
  # Personal Team limit.
  IsoNim-Stream:
    type: application
    platform: iOS
    sources:
      - path: ios-app/StreamSources
    settings:
      base:
        INFOPLIST_FILE: ios-app/StreamSources/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.metacraft.isonim.cocoa.stream
        SWIFT_ACTIVE_COMPILATION_CONDITIONS: THEME_STREAM
        PRODUCT_NAME: "IsoNim Stream"
        PRODUCT_MODULE_NAME: IsoNimCocoa_iOS_Stream
        OTHER_LDFLAGS: ["-lisonim_app", "-ltask_app_ios", "-lsettings_app_ios", "-lobjc", "-lc++"]
        LIBRARY_SEARCH_PATHS: ["$(PROJECT_DIR)/build"]
    dependencies: []

  IsoNimCocoa-Tests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: ios-app/Tests
    settings:
      base:
        INFOPLIST_FILE: ios-app/Tests/Info.plist
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/IsoNim Native.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/IsoNim Native"
        BUNDLE_LOADER: "$(TEST_HOST)"
    dependencies:
      - target: IsoNim-Native

schemes:
  Branded:
    build:
      targets:
        IsoNim-Branded: all
    test:
      targets: []
  NimNative:
    build:
      targets:
        IsoNim-NimNative: all
    test:
      targets: []
  Baseline:
    build:
      targets:
        IsoNim-Baseline: all
    test:
      targets: []
  Native:
    build:
      targets:
        IsoNim-Native: all
        IsoNimCocoa-Tests: [test]
    test:
      targets:
        - IsoNimCocoa-Tests
  Stream:
    build:
      targets:
        IsoNim-Stream: all
    test:
      targets: []
